<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新建 Session 图标选择</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f5f5f5;
    padding: 40px 20px;
    color: #333;
  }
  h1 {
    text-align: center;
    font-size: 20px;
    margin-bottom: 8px;
  }
  .subtitle {
    text-align: center;
    font-size: 13px;
    color: #888;
    margin-bottom: 32px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 16px;
    max-width: 900px;
    margin: 0 auto;
  }
  .card {
    background: #fff;
    border-radius: 12px;
    padding: 24px 16px;
    text-align: center;
    cursor: pointer;
    transition: box-shadow 0.2s, transform 0.15s;
    border: 2px solid transparent;
    position: relative;
  }
  .card:hover {
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    transform: translateY(-2px);
  }
  .card.selected {
    border-color: #3b82f6;
    box-shadow: 0 4px 16px rgba(59,130,246,0.15);
  }
  .card .num {
    position: absolute;
    top: 8px;
    left: 10px;
    font-size: 11px;
    color: #bbb;
    font-weight: 600;
  }
  .icon-wrap {
    width: 44px;
    height: 44px;
    margin: 0 auto 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fafafa;
    border-radius: 10px;
    border: 1px solid #e5e5e5;
  }
  .icon-wrap svg {
    display: block;
  }
  .card .name {
    font-size: 12px;
    color: #555;
    line-height: 1.4;
  }
  .card .tag {
    font-size: 10px;
    color: #aaa;
    margin-top: 4px;
  }
  .note {
    max-width: 900px;
    margin: 32px auto 0;
    padding: 16px 20px;
    background: #fff;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.7;
    color: #666;
  }
  .note code {
    background: #f0f0f0;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 12px;
    color: #333;
  }
</style>
</head>
<body>
<h1>新建 Session 图标选择</h1>
<p class="subtitle">点击卡片即可选中，告诉我编号即可</p>

<div class="grid" id="grid"></div>

<div class="note">
  <strong>当前按钮样式：</strong>背景透明，默认色 <code>#bbb</code>，hover <code>#666</code>，尺寸约 13×13px，display inline-flex 居中。<br>
  如果以上都不满意，可以描述你想要的风格（更大/实心/某种形状等），我可以继续补充。
</div>

<script>
const icons = [
  { name: '铅笔', tag: '编辑/修改', svg: '<svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M11.5 2.5l2 2L4 14l-3 1 1-3L11.5 2.5z"/></svg>' },
  { name: '方形加号', tag: '经典新建', svg: '<svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="2.5" y="2.5" width="11" height="11" rx="1.5"/><path d="M8 5v6M5 8h6"/></svg>' },
  { name: '新文件', tag: '文档新建', svg: '<svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 2H4.5A1.5 1.5 0 0 0 3 3.5v9A1.5 1.5 0 0 0 4.5 14h7a1.5 1.5 0 0 0 1.5-1.5V6L9 2z"/><path d="M9 2v4h4"/></svg>' },
  { name: '气泡+加号', tag: '新建对话', svg: '<svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2 4.5a2.5 2.5 0 0 1 2.5-2.5h7A2.5 2.5 0 0 1 14 4.5v5a2.5 2.5 0 0 1-2.5 2.5h-2L8 14l-1.5-2h-2A2.5 2.5 0 0 1 2 9.5v-5z"/><path d="M8 6v3M6.5 7.5h3"/></svg>' },
  { name: '纸飞机', tag: '发送/启动', svg: '<svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 1.5L8 14l-2.5-5.5L1 6l13.5-4.5z"/><path d="M8 14V8"/></svg>' },
  { name: '圆形加号', tag: '柔和添加', svg: '<svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="5.5"/><path d="M8 5.5v5M5.5 8h5"/></svg>' },
  { name: '纯十字', tag: '极简 +', svg: '<svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3v10M3 8h10"/></svg>' },
  { name: '重叠方块', tag: '新建标签页', svg: '<svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2h7a1 1 0 0 1 1 1v7"/><rect x="2" y="6" width="8" height="8" rx="1"/></svg>' },
  { name: '小火箭', tag: '启动/发射', svg: '<svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2s-3 3-3 7v1l3 3 3-3v-1c0-4-3-7-3-7z"/><circle cx="8" cy="7.5" r="1" fill="currentColor" stroke="none"/></svg>' },
  { name: '闪电', tag: '快速启动', svg: '<svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 2L5 9h4l-2 5 6-7H9l2-5z"/></svg>' },
  { name: '右箭头', tag: '进入/下一步', svg: '<svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3l5 5-5 5"/></svg>' },
  { name: '聊天气泡', tag: '会话', svg: '<svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M14 6a3 3 0 0 0-3-3H5a3 3 0 0 0-3 3v4a3 3 0 0 0 3 3h1v3l3-3h2a3 3 0 0 0 3-3V6z"/></svg>' },
  { name: '实心方块', tag: '实心填充', svg: '<svg viewBox="0 0 16 16" width="13" height="13" fill="currentColor" stroke="none"><rect x="3" y="3" width="10" height="10" rx="2"/></svg>' },
  { name: '大号加号', tag: '醒目 +', svg: '<svg viewBox="0 0 16 16" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1.5" y="1.5" width="13" height="13" rx="2"/><path d="M8 4.5v7M4.5 8h7"/></svg>' },
  { name: '播放三角形', tag: '开始播放', svg: '<svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor" stroke="none"><path d="M5 3l7 5-7 5z"/></svg>' },
  { name: '菱形', tag: '新/珍贵', svg: '<svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor" stroke="none"><path d="M8 2l6 6-6 6-6-6z"/></svg>' },
];

const grid = document.getElementById('grid');
let selected = null;

icons.forEach((icon, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <span class="num">${i + 1}</span>
    <div class="icon-wrap" style="color:#999">${icon.svg}</div>
    <div class="name">${icon.name}</div>
    <div class="tag">${icon.tag}</div>
  `;
  card.addEventListener('click', () => {
    document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    selected = i + 1;
    console.log('Selected:', selected, icon.name);
  });
  grid.appendChild(card);
});
</script>
</body>
</html>
